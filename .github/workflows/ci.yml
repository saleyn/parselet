name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elixir: ["1.15", "1.16", "1.17"]
        otp: ["26", "27"]
        include:
          - elixir: latest
            otp: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: loose

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Run tests and enforce coverage threshold
        run: |
          set -e
          mix test --cover | \
          awk '/Total/{
            gsub(/[^0-9.]/,"");
            coverage=$0
          } END {
            if (coverage < 90.0) {
              printf "Coverage %.2f%% is below threshold 90.0%%\n", coverage;
              exit 1
            } else {
              printf "Total coverage: %.2f%%\n", coverage
            }
          }'
